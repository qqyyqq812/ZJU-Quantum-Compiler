# V14 High-Throughput — IBM Tokyo 20Q, RTX 5090 (208 CPU cores)
# 优化日志: num_envs 20→100, rollout_steps 32768→8192
# 理由: CPU 瓶颈，GPU 利用率只有 3%；208 核心允许 100+ worker
version: v14
algorithm: PPO

topology:
  name: ibm_tokyo
  n_qubits: 20

training:
  episodes: 100000
  rollout_steps: 8192      # 缩短 rollout，更频繁 GPU update
  num_envs: 100            # 利用 208 CPU 核心，从 20→100
  mini_batch_size: 4096
  lr_start: 3.0e-4
  lr_end: 1.0e-5
  entropy_start: 0.05
  entropy_end: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  epochs_per_update: 4
  log_interval: 100
  eval_interval: 300
  checkpoint_interval: 1000  # 更频繁 checkpoint, 保护进度

reward:
  # V14 §V14-3: 奖励分层 — 早期固定完成奖励，后期 SABRE 相对
  gate: 1.0           # 早期 (stage <= 2) 生效；晚期降权至 0.3（env 内部处理）
  swap: -0.5
  done: 5.0           # 早期完成奖励 base (与 early_stage_reward_floor 取 max)
  distance_coef: 0.3
  lookahead_coef: 0.1
  sabre_relative: true
  sabre_cache: true   # V14 §V14-1
  early_stage_reward_floor: 5.0   # stage<=2 的终端奖励下限
  early_stage_sabre_weight: 0.1   # stage<=2 的 SABRE 相对奖励权重

environment:
  # V14.2: 300 太严苛，10Q 训练时几乎全部被截断（training SWAP 贴 298，但 eval=45）
  # 调到 800：让 10Q episode 自然收敛（eval 长跑也只到 ~45 SWAP），保留 truncation 惩罚
  # 推理时仍可超过 800 步进 SABRE fallback
  max_steps: 800
  soft_mask: true      # 仅 stage >= 2 生效（env::get_action_mask）
  tabu_size: 4
  random_mapping: true

curriculum:
  enabled: true
  min_episodes_per_stage: 100
  promotion_patience: 3000

paths:
  save_dir: models/v14_tokyo20
  resume: null
